<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6E7D5B"/>
      <stop offset="1" stop-color="#5F6E4E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCC79B"/>
      <stop offset="1" stop-color="#C4A468"/>
    </linearGradient>
  </defs>

  <!-- Latar bulat sage -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Cincin emas dekoratif -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.75"/>
  <circle cx="256" cy="256" r="182" fill="none" stroke="#DCC79B" stroke-width="2" opacity="0.5"/>

  <!-- Daun kecil di atas & bawah -->
  <g fill="url(#gold)" opacity="0.9">
    <path d="M256 66 c14 20 14 40 0 58 c-14-18-14-38 0-58z"/>
    <path d="M256 446 c14-20 14-40 0-58 c-14 18-14 38 0 58z"/>
  </g>

  <!-- Inisial N & A -->
  <text x="176" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="200" font-weight="600" fill="#FAF6EE">N</text>
  <text x="256" y="292" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-style="italic" fill="url(#gold)">&amp;</text>
  <text x="340" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="200" font-weight="600" fill="#FAF6EE">A</text>
</svg>
